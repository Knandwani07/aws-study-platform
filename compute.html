<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Compute Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* AWS Console Dark Theme Colors */
            --aws-dark-bg: #0f1b2a;
            --aws-darker-bg: #0a1628;
            --aws-card-bg: #16202e;
            --aws-card-hover: #1d2b3d;
            --aws-border: #2a3f5f;
            --aws-border-light: #3d5170;
            --aws-text-primary: #ffffff;
            --aws-text-secondary: #aab7c5;
            --aws-text-muted: #7d8998;
            --aws-accent-blue: #0972d3;
            --aws-accent-blue-hover: #0d8aec;
            --aws-accent-orange: #ff9900;
            --aws-header-bg: #16202e;
            --aws-bg-header-gradient-start: #232f3e;
            --aws-bg-header-gradient-end: #1a2433;
            --glow-color: rgba(9, 114, 211, 0.3);
            --bg-primary: #0f1b2a;
            --bg-secondary: #16202e;
            --bg-tertiary: #1a2433;
            --bg-header: #232f3e;
            --border-color: #2a3f5f;
            --text-primary: #ffffff;
            --text-secondary: #aab7c4;
            --text-muted: #687078;
            --accent-blue: #0972d3;
            --accent-orange: #ff9900;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 8px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 16px rgba(0, 0, 0, 0.5);
            --sidebar-width: 260px;
            --sidebar-collapsed-width: 70px;
            --header-height: 70px;
        }

        body.light-mode {
            --aws-dark-bg: #f2f3f3;
            --aws-darker-bg: #e8e9ea;
            --aws-card-bg: #ffffff;
            --aws-card-hover: #f8f9fa;
            --aws-border: #d5dbdb;
            --aws-border-light: #e9ecef;
            --aws-text-primary: #16191f;
            --aws-text-secondary: #5f6b7a;
            --aws-text-muted: #879596;
            --aws-header-bg: #ffffff;
            --aws-bg-header-gradient-start: #ffffff;
            --aws-bg-header-gradient-end: #f8f9fa;
            --glow-color: rgba(9, 114, 211, 0.2);
            --bg-primary: #f2f3f3;
            --bg-secondary: #ffffff;
            --bg-tertiary: #fafafa;
            --bg-header: #ffffff;
            --border-color: #d5dbdb;
            --text-primary: #16191f;
            --text-secondary: #5f6b7a;
            --text-muted: #879596;
            --accent-blue: #0972d3;
            --accent-orange: #ff9900;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 8px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 16px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'Inter', 'Poppins', 'Amazon Ember', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--aws-dark-bg);
            min-height: 100vh;
            color: var(--aws-text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* AWS Header - Simplified Single Row */
        .aws-header {
            background: linear-gradient(180deg, var(--aws-bg-header-gradient-start) 0%, var(--aws-bg-header-gradient-end) 100%);
            border-bottom: 2px solid var(--aws-border-light);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            height: var(--header-height);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        body.light-mode .aws-header {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            max-width: 1920px;
            margin: 0 auto;
            height: 100%;
            gap: 24px;
        }

        .console-title-container {
            flex: 0 0 auto;
        }

        .console-home-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .title-icon {
            font-size: 1.5rem;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        body.light-mode .title-icon {
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.1));
        }

        .quick-nav {
            display: flex;
            gap: 12px;
            flex: 1;
            justify-content: center;
        }

        .nav-pill {
            padding: 10px 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
            border: 2px solid var(--aws-border-light);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        body.light-mode .nav-pill {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.03), rgba(0, 0, 0, 0.01));
        }

        .nav-pill:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.08));
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(9, 114, 211, 0.3);
        }

        body.light-mode .nav-pill:hover {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0.03));
            box-shadow: 0 4px 12px rgba(9, 114, 211, 0.2);
        }

        .nav-pill.active {
            background: linear-gradient(135deg, var(--accent-orange), #ec7211);
            border-color: var(--accent-orange);
            color: #000;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-divider {
            width: 2px;
            height: 40px;
            background: linear-gradient(180deg, transparent, var(--aws-border-light), transparent);
            margin: 0 8px;
        }

        .theme-toggle-btn {
            position: relative;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 2px solid var(--aws-border-light);
            color: var(--text-primary);
            padding: 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.5rem;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body.light-mode .theme-toggle-btn {
            background: linear-gradient(135deg, rgba(255, 200, 0, 0.2), rgba(255, 200, 0, 0.1));
            border-color: rgba(255, 200, 0, 0.4);
        }

        .theme-toggle-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .theme-toggle-btn:hover::before {
            left: 100%;
        }

        .theme-toggle-btn:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.1));
            border-color: var(--accent-orange);
            transform: translateY(-2px) rotate(15deg);
            box-shadow: 0 6px 20px rgba(255, 153, 0, 0.4);
        }

        body.light-mode .theme-toggle-btn:hover {
            border-color: #ffc800;
            box-shadow: 0 6px 20px rgba(255, 200, 0, 0.5);
        }

        .theme-icon {
            font-size: 1.5rem;
            transition: transform 0.3s ease;
            display: block;
        }

        .theme-toggle-btn:hover .theme-icon {
            transform: scale(1.1);
        }

        .header-btn-profile {
            background: linear-gradient(135deg, rgba(255, 153, 0, 0.15), rgba(255, 153, 0, 0.1));
            border: 2px solid rgba(255, 153, 0, 0.3);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
            font-weight: 600;
            min-width: 50px;
        }

        .header-btn-profile:hover {
            background: linear-gradient(135deg, rgba(255, 153, 0, 0.25), rgba(255, 153, 0, 0.15));
            border-color: var(--accent-orange);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 153, 0, 0.5);
        }

        #profileAvatar {
            font-size: 1.25rem;
        }

        .console-container {
            display: flex;
            min-height: calc(100vh - var(--header-height));
        }

        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--aws-border);
            overflow-y: auto;
            overflow-x: hidden;
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
        }

        .sidebar-toggle {
            position: sticky;
            top: 0;
            right: 0;
            width: 100%;
            height: 48px;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--aws-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .sidebar-toggle:hover {
            background-color: var(--bg-tertiary);
            color: var(--accent-orange);
        }

        .toggle-icon {
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.collapsed .toggle-icon {
            transform: rotate(180deg);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar-section {
            padding: 16px 0;
            border-bottom: 1px solid var(--aws-border);
        }

        .sidebar-title {
            color: var(--text-muted);
            font-size: 0.6875rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 0 20px 10px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
        }

        .sidebar.collapsed .sidebar-title {
            opacity: 0;
            padding: 0 10px;
        }

        .sidebar-item {
            color: var(--text-secondary);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.875rem;
            border-left: 3px solid transparent;
            white-space: nowrap;
            position: relative;
            margin: 2px 0;
        }

        .sidebar-item:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border-left-color: var(--accent-blue);
        }

        .sidebar-item.active {
            background-color: var(--bg-tertiary);
            border-left-color: var(--accent-orange);
            color: var(--text-primary);
            font-weight: 500;
        }

        .sidebar-item-icon {
            width: 22px;
            height: 22px;
            text-align: center;
            font-size: 1.1rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-item-text {
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
        }

        .sidebar.collapsed .sidebar-item-text {
            opacity: 0;
            width: 0;
            overflow: hidden;
        }

        .sidebar.collapsed .sidebar-item {
            justify-content: center;
            padding: 12px 0;
            gap: 0;
        }

        .sidebar.collapsed .sidebar-item::before {
            content: attr(data-tooltip);
            position: absolute;
            left: calc(100% + 12px);
            top: 50%;
            transform: translateY(-50%) translateX(-10px);
            background: linear-gradient(135deg, var(--bg-header), #1a2433);
            color: var(--text-primary);
            padding: 8px 14px;
            border-radius: 6px;
            white-space: nowrap;
            font-size: 0.875rem;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
            pointer-events: none;
            opacity: 0;
            transition: all 0.2s ease;
            border: 1px solid var(--aws-border-light);
        }

        .sidebar.collapsed .sidebar-item:hover::before {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        .main-content {
            flex: 1;
            background-color: var(--aws-dark-bg);
            overflow-y: auto;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
        }

        .hero-section {
            background: var(--aws-header-bg);
            padding: 80px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--aws-border);
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 20%, rgba(9, 114, 211, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255, 153, 0, 0.05) 0%, transparent 50%);
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: var(--aws-card-bg);
            color: var(--aws-accent-blue);
            border: 1px solid var(--aws-border);
            padding: 14px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 3;
            letter-spacing: 0.5px;
        }

        .back-btn:hover {
            background: var(--aws-card-hover);
            border-color: var(--aws-accent-blue);
            box-shadow: 0 4px 16px var(--glow-color);
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 800;
            color: var(--aws-text-primary);
            margin-bottom: 24px;
            letter-spacing: -0.02em;
            position: relative;
            z-index: 2;
        }

        .hero-subtitle {
            font-size: 1.4rem;
            color: var(--aws-text-secondary);
            margin-bottom: 40px;
            font-weight: 400;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 2;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 20px;
            position: relative;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 32px;
            margin-top: 20px;
        }

        .service-card {
            background: var(--aws-card-bg);
            border: 1px solid var(--aws-border);
            border-radius: 12px;
            padding: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            height: auto;
            min-height: 500px;
            display: block;
            cursor: pointer;
            perspective: 1000px;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(9, 114, 211, 0.1) 0%, rgba(255, 153, 0, 0.05) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 12px;
            z-index: -1;
        }

        .service-card:hover::before {
            opacity: 1;
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 32px rgba(9, 114, 211, 0.2);
            border-color: var(--aws-accent-blue);
            background: var(--aws-card-hover);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 500px;
            text-align: left;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .service-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            min-height: 500px;
            backface-visibility: hidden;
            border-radius: 12px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        .card-front::-webkit-scrollbar,
        .card-back::-webkit-scrollbar {
            width: 6px;
        }

        .card-front::-webkit-scrollbar-track,
        .card-back::-webkit-scrollbar-track {
            background: var(--aws-darker-bg);
            border-radius: 3px;
        }

        .card-front::-webkit-scrollbar-thumb,
        .card-back::-webkit-scrollbar-thumb {
            background: var(--aws-accent-blue);
            border-radius: 3px;
        }

        .card-front::-webkit-scrollbar-thumb:hover,
        .card-back::-webkit-scrollbar-thumb:hover {
            background: var(--aws-accent-blue-hover);
        }

        .card-back {
            transform: rotateY(180deg);
            background: var(--aws-card-bg);
        }

        .service-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            flex-shrink: 0;
            position: relative;
        }

        .service-icon {
            width: 64px;
            height: 64px;
            background: var(--aws-accent-orange);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--aws-darker-bg);
            margin-right: 20px;
            box-shadow: 0 4px 16px rgba(255, 153, 0, 0.3);
            transition: all 0.4s ease;
            flex-shrink: 0;
            position: relative;
        }

        .service-icon::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: var(--aws-accent-orange);
            border-radius: 14px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
            filter: blur(8px);
        }

        .service-card:hover .service-icon::before {
            opacity: 0.6;
        }

        .service-card:hover .service-icon {
            transform: scale(1.05);
            box-shadow: 0 6px 24px rgba(255, 153, 0, 0.4);
        }

        .service-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--aws-text-primary);
            margin: 0;
            letter-spacing: -0.01em;
            line-height: 1.3;
        }

        .floating-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: var(--aws-accent-blue);
            opacity: 0.4;
            animation: float-gentle 3s ease-in-out infinite;
        }

        @keyframes float-gentle {
            0%, 100% { transform: translateY(-50%) translateX(0px); }
            50% { transform: translateY(-50%) translateX(3px); }
        }

        .service-description {
            color: var(--aws-text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 24px;
            font-weight: 400;
            flex-grow: 1;
        }

        .fact-section {
            background: linear-gradient(135deg, rgba(9, 114, 211, 0.15) 0%, rgba(255, 153, 0, 0.1) 100%);
            border: 1px solid var(--aws-border);
            border-radius: 12px;
            padding: 24px;
            margin: auto;
            flex-shrink: 0;
            position: relative;
            text-align: center;
        }

        .fact-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--aws-accent-blue), var(--aws-accent-orange));
            border-radius: 12px 12px 0 0;
        }

        .fact-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--aws-accent-blue);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fact-label::before {
            content: '✨';
            margin-right: 8px;
            font-size: 1rem;
        }

        .fact-text {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--aws-text-secondary);
            line-height: 1.5;
        }

        .service-details {
            background: var(--aws-darker-bg);
            border: 1px solid var(--aws-border);
            border-radius: 12px;
            padding: 24px;
            margin-top: auto;
            flex-shrink: 0;
            position: relative;
        }

        .service-details::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--aws-accent-blue), var(--aws-accent-orange));
            border-radius: 12px 12px 0 0;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 16px 0;
            border-bottom: 1px solid var(--aws-border);
            transition: all 0.3s ease;
        }

        .detail-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .detail-row:hover {
            background: rgba(9, 114, 211, 0.08);
            padding-left: 16px;
            padding-right: 16px;
            margin: 0 -16px;
            border-radius: 8px;
            transform: translateX(4px);
        }

        .detail-label {
            font-weight: 500;
            color: var(--aws-accent-blue);
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            gap: 8px;
        }

        .detail-label i {
            margin-right: 10px;

        }

        @media (max-width: 1200px) {
            .quick-nav {
                gap: 8px;
            }

            .nav-pill {
                padding: 8px 14px;
                font-size: 0.875rem;
            }
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .sidebar {
                position: fixed;

        .scroll-to-top {

        function createServiceCard(service) {
            return `
                <div class="service-card" onclick="flipCard(this)">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="service-header">
                                <div class="service-icon">
                                    <i class="${service.icon}"></i>
                                </div>
                                <h3 class="service-title">${service.name}</h3>
                            </div>
                            <div class="fact-section">
                                <div class="fact-label">Quick Fact</div>
                                <div class="fact-text">${service.fact}</div>
                            </div>
                        </div>
                        <div class="card-back">
                            <div class="service-header">
                                <div class="service-icon">
                                    <i class="${service.icon}"></i>
                                </div>
                                <h3 class="service-title">${service.name}</h3>
                            </div>
                            <p class="service-description">${service.description}</p>
                            <div class="service-details">
                                ${service.details.map(detail => `
                                    <div class="detail-row">
                                        <div class="detail-label">
                                            <i class="${detail.icon}"></i>
                                            ${detail.label}
                                        </div>
                                        <div class="detail-value">${detail.value}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function flipCard(card) {
            card.classList.toggle('flipped');
        }

        function initializeScrollToTop() {
            const scrollButton = document.getElementById('scroll-to-top');

            window.addEventListener('scroll', () => {
                if (window.pageYOffset > 300) {
                    scrollButton.classList.add('visible');
                } else {
                    scrollButton.classList.remove('visible');
                }
            });

            scrollButton.addEventListener('click', () => {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        }

        // Theme Toggle
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');
            
            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                themeIcon.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            } else {
                themeIcon.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Sidebar functions
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        function toggleSidebarCollapse() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
        }

        // User menu
        function toggleUserMenu() {
            const userName = localStorage.getItem('userName');
            
            if (!userName) {
                const name = prompt('Welcome! Please enter your name to personalize your experience:');
                if (name && name.trim() !== '') {
                    localStorage.setItem('userName', name.trim());
                    updateProfileDisplay(name.trim());
                    alert('Welcome, ' + name.trim() + '! Your profile has been set up.');
                }
            } else {
                const choice = prompt(
                    'Account Menu - ' + userName + '\n\n' +
                    '1. View Profile\n' +
                    '2. Settings\n' +
                    '3. Sign Out\n\n' +
                    'Enter your choice (1-3):'
                );
                
                if (choice === '1') viewProfile();
                else if (choice === '2') manageSettings();
                else if (choice === '3') signOut();
            }
        }

        function viewProfile() {
            const userName = localStorage.getItem('userName');
            const joinDate = localStorage.getItem('userJoinDate') || new Date().toISOString();
            
            const joinDateFormatted = new Date(joinDate).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            
            alert(
                '👤 Profile Information\n\n' +
                'Name: ' + userName + '\n' +
                'Member Since: ' + joinDateFormatted
            );
        }

        function manageSettings() {
            alert('⚙️ Settings\n\nFeature coming soon!\n\nYou\'ll be able to:\n- Customize dashboard\n- Set study reminders\n- Manage notifications\n- Export progress data');
        }

        function signOut() {
            if (confirm('Are you sure you want to sign out?')) {
                localStorage.removeItem('userName');
                updateProfileDisplay('');
                alert('👋 You have been signed out successfully!');
            }
        }

        function updateProfileDisplay(name) {
            const profileName = document.getElementById('profileName');
            if (name && name.trim() !== '') {
                profileName.textContent = name;
                profileName.style.display = 'inline';
            } else {
                profileName.textContent = '';
                profileName.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('servicesGrid');
            grid.innerHTML = computeServices.map(createServiceCard).join('');
            initializeScrollToTop();

            // Initialize sidebar state
            const sidebar = document.getElementById('sidebar');
            const sidebarCollapsed = localStorage.getItem('sidebarCollapsed');
            const userName = localStorage.getItem('userName');
            const savedTheme = localStorage.getItem('theme');
            const themeIcon = document.getElementById('themeIcon');
            
            if (sidebarCollapsed === 'true') {
                sidebar.classList.add('collapsed');
            }

            if (userName) {
                updateProfileDisplay(userName);
            }

            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                themeIcon.textContent = '☀️';
            } else {
                themeIcon.textContent = '🌙';
            }

            if (!localStorage.getItem('userJoinDate')) {
                localStorage.setItem('userJoinDate', new Date().toISOString());
            }
        });
    </script>
